<body>

        </form>
        <br>

        <button type="button" class="btn btn-success" onclick="budget()"> Get Budget </button>

<script>
    function budget(){
        let disc = document.getElementById('disc').value; 
        let price = disc * 0.20;
        let finalprice = disc - price;
        document.getElementById('showbrand').innerHTML= "Your budget is equivalent to PHP " + finalprice.toFixed(2);// round off discount to 2 decimal places;
    }  
    document.getElementById('instructions').innerHTML= "Enter your recommended budget and click the button to show the discounted price of your product";//instructions code

</script>
